name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libgtk-3-dev libwayland-dev libxkbcommon-dev \
            libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/myrient-dl     dist/myrient-dl-linux-x86_64
          cp target/release/myrient-dl-cli dist/myrient-dl-cli-linux-x86_64
          chmod +x dist/myrient-dl-linux-x86_64 dist/myrient-dl-cli-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: dist/

  build-windows:
    name: Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install Rust stable + Windows target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Only build the GUI binary for Windows — CLI not included
      # (windows_subsystem = "windows" suppresses console; a CLI binary
      #  would need a separate subsystem attribute which conflicts with GUI)
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc

      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/myrient-dl.exe     dist/myrient-dl-windows-x86_64.exe
          cp target/x86_64-pc-windows-gnu/release/myrient-dl-cli.exe dist/myrient-dl-cli-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: Create universal binaries and .app bundle
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/myrient-dl \
            target/aarch64-apple-darwin/release/myrient-dl \
            -output dist/myrient-dl-macos-universal
          lipo -create \
            target/x86_64-apple-darwin/release/myrient-dl-cli \
            target/aarch64-apple-darwin/release/myrient-dl-cli \
            -output dist/myrient-dl-cli-macos-universal
          chmod +x dist/myrient-dl-macos-universal dist/myrient-dl-cli-macos-universal

          # Build .app bundle
          APP=dist/myrient-dl.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp dist/myrient-dl-macos-universal "$APP/Contents/MacOS/myrient-dl"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>myrient-dl</string>
            <key>CFBundleIdentifier</key>
            <string>com.myrient-dl.app</string>
            <key>CFBundleName</key>
            <string>myrient-dl</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # Remove quarantine attribute and zip the bundle
          xattr -cr "$APP"
          cd dist && zip -r myrient-dl-macos.zip myrient-dl.app
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            dist/myrient-dl-macos-universal
            dist/myrient-dl-cli-macos-universal
            dist/myrient-dl-macos.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-x86_64/myrient-dl-linux-x86_64
            artifacts/linux-x86_64/myrient-dl-cli-linux-x86_64
            artifacts/windows-x86_64/myrient-dl-windows-x86_64.exe
            artifacts/windows-x86_64/myrient-dl-cli-windows-x86_64.exe
            artifacts/macos-universal/myrient-dl-macos-universal
            artifacts/macos-universal/myrient-dl-cli-macos-universal
            artifacts/macos-universal/myrient-dl-macos.zip
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | GUI | CLI |
            |----------|-----|-----|
            | Linux x86_64 | [myrient-dl-linux-x86_64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/myrient-dl-linux-x86_64) | [myrient-dl-cli-linux-x86_64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/myrient-dl-cli-linux-x86_64) |
            | Windows x86_64 | [myrient-dl-windows-x86_64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/myrient-dl-windows-x86_64.exe) | [myrient-dl-cli-windows-x86_64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/myrient-dl-cli-windows-x86_64.exe) |
            | macOS Universal | [myrient-dl-macos.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/myrient-dl-macos.zip) (.app bundle) · [bare binary](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/myrient-dl-macos-universal) | [myrient-dl-cli-macos-universal](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/myrient-dl-cli-macos-universal) |

            > **macOS:** Download `myrient-dl-macos.zip`, unzip it, and drag `myrient-dl.app` to your Applications folder. On first launch right-click → Open to bypass Gatekeeper.
